{{- if .Values.serviceMonitor.enabled }}
{{- with .Values.serviceMonitor }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "prometheus-graphite-exporter.labels" $ | nindent 4 }}
    {{- with .labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  name: {{ include "prometheus-graphite-exporter.fullname" $ }}
  {{- if .namespace }}
  namespace: {{ .namespace }}
  {{- else }}
  namespace: {{ include "prometheus-graphite-exporter.namespace" $ }}
  {{- end }}
spec:
  endpoints:
    - port: {{ $.Values.service.portName }}
      path: {{ $.Values.metrics.path }}
      scheme: {{ .scheme }}
      interval: {{ .interval }}
      scrapeTimeout: {{ .scrapeTimeout }}
      honorLabels: {{ .honorLabels }}
      {{- with .metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .relabelings }}
      relabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .basicAuth }}
      basicAuth:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .tlsConfig }}
      tlsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .jobLabel }}
  jobLabel: {{ .jobLabel }}
  {{- end }}
  {{- with .targetLabels }}
  targetLabels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- if .attachMetadata.node }}
  attachMetadata:
    node: true
{{- end }}
  selector:
    matchLabels:
      {{- include "prometheus-graphite-exporter.selectorLabels" $ | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ include "prometheus-graphite-exporter.namespace" $ }}
{{- end }}
{{- end }}
