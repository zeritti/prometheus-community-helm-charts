## Default values for prometheus-graphite-exporter.
## This is a YAML-formatted file.
## Declare variables to be passed into your templates.

## Count of replicas
replicaCount: 1

## Image and registry configuration
image:
  registry: quay.io
  repository: prometheus/graphite-exporter
  pullPolicy: IfNotPresent
  ## Overrides the image tag whose default is the chart appVersion.
  tag: ""
  ## Digest overrides tag
  digest: ""

imagePullSecrets: []

nameOverride: ""

fullnameOverride: ""

## Override installation namespace
namespaceOverride: ""

## Service account configuration
serviceAccount:
  ## Specifies whether a service account should be created
  create: true
  ## Automatically mount a ServiceAccount's API token
  automount: false
  ## Annotations and labels to add to the service account
  annotations: {}
  labels: {}
  ## The name of the service account to use.
  ## If not set and create is true, a name is generated using the fullname template
  name: ""

## Commmon labels for all resources
commonLabels: {}

## Pod labels and annotations
podAnnotations: {}
podLabels: {}

## Deployment labels and annotations
deploymentAnnotations: {}
deploymentLabels: {}

## Security context of the pod
podSecurityContext:
  runAsGroup: 65534
  runAsNonRoot: true
  runAsUser: 65534

## Security context of the container
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault

## Container's metrics port, port name and telemetry path
metrics:
  port: 9108
  portName: metrics
  path: /metrics

## Service configuration
service:
  enabled: true
  type: ClusterIP

  ## Metrics port
  port: 9108
  portName: metrics

  ## TCP and UDP receiver ports
  graphitePort: 9109
  graphitePortName: graphite
  graphiteUdpPortName: graphite-udp

  ## Annotations and labels
  annotations: {}
  labels: {}

## Exporter's runtime parameters
graphite:
  ## TCP and UDP port on which to accept samples
  port: 9109
  portName: graphite
  udpPortName: graphite-udp
  ## Maximum size of metric mapping cache (1000)
  cacheSize: null
  ## Metric mapping cache type. Valid options are "lru" (default) and "random"
  cacheType: ""
  ## Force strict mapping match
  mappingStrictMatch: false
  ## How long a sample is valid for (5m)
  sampleExpiry: ""

  ## Mapping configuration to be stored in graphite-mapping.conf file (string)
  ## ref. https://github.com/prometheus/graphite_exporter#yaml-config
  mappingConfig: ""
  # mappingConfig: |-
    # mappings:
    # - match: test.dispatcher.*.*.*
    #   name: dispatcher_events_total
    #   labels:
    #     action: $2
    #     job: test_dispatcher
    #     outcome: $3
    #     processor: $1

## Additional flags. For flags without argument, set key with its value empty or null.
extraFlags: {}
  # log.level: debug

## Container resources
resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

## Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 3

readinessProbe:
  httpGet:
    path: /
    port: http

## Additional volumes in the pod
extraVolumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

## Additional volume mounts in the container
extraVolumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

## Node selector
nodeSelector: {}

## Tolerations
tolerations: []

## Affinity
affinity: {}

## Service monitor
## ref. https://prometheus-operator.dev/docs/operator/api/#monitoring.coreos.com/v1.ServiceMonitor
serviceMonitor:
  enabled: false

  annotations: {}
  labels: {}
    # release: kube-prometheus-stack
  namespace: ""

  attachMetadata:
    node: false
  basicAuth: {}
  honorLabels: false
  interval: 60s
  jobLabel: ""
  scheme: http
  scrapeTimeout: 10s
  targetLabels: []
  tlsConfig: {}

  metricRelabelings: []
  relabelings: []

## Extra manifests (templated) to deploy with the chart (array of strings)
extraManifests: []
  # - |
  #   apiVersion: v1
  #   kind: ConfigMap
  #   metadata:
  #     name: extra-cm
  #   data:
  #     GREETING: "hello"
